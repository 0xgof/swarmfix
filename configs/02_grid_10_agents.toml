seed = 11

[scenario]
name = "grid_10_agents"
dimension = 2
formation = "grid"
num_agents = 10
spacing_m = 5.0

[topology]
mode = "neighbour"
max_distance_m = 7.2

[gnss]
sigma_m = 2.0
common_bias_m = [0.75, -0.4]
independent_sigma_m = 0.9
outlier_probability = 0.0
outlier_sigma_m = 0.0
spatial_correlation_enabled = false
spatial_correlation_sigma_m = 0.0

[uwb]
enabled = true
sigma_m = 0.1
max_range_m = 7.2
missing_link_probability = 0.0
nlos_probability = 0.0
nlos_positive_bias_m = 0.0

[reference]
enabled = false
type = "known_agent_position"

[estimation]
method = "least_squares"
robust_loss = "linear"
export_solver_trace = true
max_iterations = 80
